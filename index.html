<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>SlitherGrid</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0a0a0f;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      min-height: 100dvh;
      font-family: 'Courier New', monospace;
      overflow: hidden;
      touch-action: none;
    }

    .game-wrapper {
      position: relative;
      padding: 16px;
      background: #111118;
      border-radius: 16px;
      box-shadow: 0 0 60px rgba(0, 255, 170, 0.08), inset 0 0 60px rgba(0, 0, 0, 0.5);
      border: 1px solid #1a1a2e;
      max-width: 98vw;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
      padding: 0 4px;
      gap: 10px;
    }

    h1 {
      color: #00ffaa;
      font-size: clamp(14px, 4vw, 28px);
      font-weight: 400;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      text-shadow: 0 0 20px rgba(0, 255, 170, 0.3);
      white-space: nowrap;
    }

    .stats {
      display: flex;
      gap: 16px;
    }

    .stat { text-align: center; }

    .stat-label {
      color: #555;
      font-size: clamp(8px, 2vw, 10px);
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .stat-value {
      color: #fff;
      font-size: clamp(18px, 5vw, 24px);
      font-weight: bold;
    }

    .stat-value.high { color: #ffd700; }

    canvas {
      display: block;
      border: 1px solid #1a1a2e;
      border-radius: 8px;
      background: #0d0d18;
      box-shadow: inset 0 0 50px rgba(0, 0, 0, 0.8);
      width: 100%;
      height: auto;
      aspect-ratio: 1 / 1;
      touch-action: none;
    }

    .controls {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 12px;
    }

    button {
      background: transparent;
      border: 1px solid #00ffaa;
      color: #00ffaa;
      padding: 8px 20px;
      font-family: 'Courier New', monospace;
      font-size: clamp(11px, 3vw, 14px);
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: pointer;
      border-radius: 4px;
      transition: all 0.2s;
    }

    button:hover {
      background: rgba(0, 255, 170, 0.1);
      box-shadow: 0 0 20px rgba(0, 255, 170, 0.2);
    }

    .direction-hint {
      color: #333;
      font-size: clamp(9px, 2.5vw, 11px);
      letter-spacing: 1px;
    }

    .overlay {
      position: absolute;
      top: 16px;
      left: 16px;
      right: 16px;
      bottom: 16px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: rgba(10, 10, 15, 0.88);
      border-radius: 16px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
      z-index: 10;
    }

    .overlay.active {
      opacity: 1;
      pointer-events: all;
    }

    .overlay h2 {
      color: #ff4757;
      font-size: clamp(24px, 8vw, 36px);
      letter-spacing: 4px;
      text-transform: uppercase;
      text-shadow: 0 0 30px rgba(255, 71, 87, 0.3);
      margin-bottom: 6px;
    }

    .overlay .sub {
      color: #888;
      font-size: clamp(12px, 3.5vw, 14px);
      margin-bottom: 20px;
      text-align: center;
      padding: 0 20px;
    }

    .overlay .final-score {
      color: #fff;
      font-size: clamp(36px, 12vw, 48px);
      font-weight: bold;
      margin-bottom: 2px;
    }

    .overlay .final-label {
      color: #555;
      font-size: clamp(10px, 3vw, 12px);
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 20px;
    }

    .overlay button {
      border-color: #ff4757;
      color: #ff4757;
    }

    .overlay button:hover {
      background: rgba(255, 71, 87, 0.1);
    }
  </style>
</head>
<body>

<div class="game-wrapper">
  <div class="header">
    <h1>~ slithergrid ~</h1>
    <div class="stats">
      <div class="stat">
        <div class="stat-label">Score</div>
        <div class="stat-value" id="score">0</div>
      </div>
      <div class="stat">
        <div class="stat-label">Best</div>
        <div class="stat-value high" id="highscore">0</div>
      </div>
    </div>
  </div>

  <canvas id="game" width="600" height="600"></canvas>

  <div class="controls">
    <span class="direction-hint">W A S D &nbsp;·&nbsp; Arrows &nbsp;·&nbsp; Swipe</span>
    <button onclick="resetGame()">↻ New Game</button>
  </div>

  <div class="overlay" id="overlay">
    <h2>💀 Game Over</h2>
    <div class="final-score" id="finalScore">0</div>
    <div class="final-label">points</div>
    <div class="sub" id="finalMsg">You collided with yourself</div>
    <button onclick="resetGame()">↻ Play Again</button>
  </div>
</div>

<script>
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const scoreEl = document.getElementById('score');
  const highEl = document.getElementById('highscore');
  const overlay = document.getElementById('overlay');
  const finalScore = document.getElementById('finalScore');
  const finalMsg = document.getElementById('finalMsg');

  const COLS = 30;
  const ROWS = 30;
  let CELL, GRID;

  let snake, food, direction, nextDirection, score, highscore, gameLoop, running;
  let particles = [];
  let mines = [];
  let mineTimer = 0;
  let gameTick = 0;

  const DEATH_MSGS = [
    "You bit yourself. Rude.",
    "No walls, just pain.",
    "Snake.exe stopped working",
    "You ran into yourself. Awkward.",
    "That's gonna leave a mark",
    "Skill issue detected",
    "Your snake needs therapy now",
    "Ouch. Right in the ego.",
    "You found a mine. Boom.",
    "KA-BOOM! That was close.",
    "Mine says hi. Bye snake.",
    "Should've zigged instead of zagged."
  ];

  const MINE_MSGS = [
    "💥 BOOM! Snake got shorter!",
    "💥 Mine exploded! Lost some length!",
    "💥 That mine was not a snack!",
    "💥 Kaboom! Say bye to your tail!",
    "💥 Minefield! Snake shortened!"
  ];

  function resizeCanvas() {
    const wrapper = canvas.parentElement;
    const maxW = wrapper.clientWidth - 4;
    const size = Math.min(maxW, Math.min(window.innerWidth - 40, 600));
    canvas.style.width = size + 'px';
    canvas.style.height = size + 'px';
    CELL = canvas.width / COLS;
    GRID = CELL;
  }

  function init() {
    resizeCanvas();
    const midX = Math.floor(COLS / 2);
    const midY = Math.floor(ROWS / 2);
    snake = [{x: midX, y: midY}, {x: midX - 1, y: midY}, {x: midX - 2, y: midY}];
    direction = {x: 1, y: 0};
    nextDirection = {x: 1, y: 0};
    score = 0;
    particles = [];
    mines = [];
    mineTimer = 0;
    gameTick = 0;
    highscore = parseInt(localStorage.getItem('slithergrid_high') || '0');
    highEl.textContent = highscore;
    spawnFood();
  }

  function spawnFood() {
    let pos;
    do {
      pos = {x: Math.floor(Math.random() * COLS), y: Math.floor(Math.random() * ROWS)};
    } while (snake.some(s => s.x === pos.x && s.y === pos.y) || mines.some(m => m.x === pos.x && m.y === pos.y));
    food = pos;
  }

  function spawnMine() {
    if (mines.length >= 3) return; // max 3 mines on screen
    let pos;
    let attempts = 0;
    do {
      pos = {x: Math.floor(Math.random() * COLS), y: Math.floor(Math.random() * ROWS)};
      attempts++;
    } while (
      (snake.some(s => s.x === pos.x && s.y === pos.y) ||
       (food.x === pos.x && food.y === pos.y) ||
       mines.some(m => m.x === pos.x && m.y === pos.y)) &&
      attempts < 100
    );
    if (attempts < 100) {
      mines.push({x: pos.x, y: pos.y, timer: 80, armed: true}); // ~8 seconds at 100ms tick
    }
  }

  function getColorForSegment(i, total) {
    const t = total > 0 ? i / total : 0;
    const g = Math.floor(200 + t * 55);
    const b = Math.floor(100 + t * 155);
    return `rgb(0,${g},${b})`;
  }

  function draw() {
    const w = canvas.width;
    const h = canvas.height;

    ctx.fillStyle = '#0d0d18';
    ctx.fillRect(0, 0, w, h);

    // Grid
    ctx.strokeStyle = 'rgba(255,255,255,0.02)';
    ctx.lineWidth = 1;
    for (let i = 1; i < COLS; i++) {
      ctx.beginPath();
      ctx.moveTo(i * CELL, 0);
      ctx.lineTo(i * CELL, h);
      ctx.stroke();
    }
    for (let i = 1; i < ROWS; i++) {
      ctx.beginPath();
      ctx.moveTo(0, i * CELL);
      ctx.lineTo(w, i * CELL);
      ctx.stroke();
    }

    // Mines
    for (const mine of mines) {
      const mx = mine.x * CELL + CELL/2;
      const my = mine.y * CELL + CELL/2;
      const pulse = 1 + Math.sin(gameTick * 0.1) * 0.15;

      // Mine glow
      const grad = ctx.createRadialGradient(mx, my, 0, mx, my, CELL * 1.2);
      grad.addColorStop(0, 'rgba(255, 100, 0, 0.3)');
      grad.addColorStop(1, 'rgba(255, 100, 0, 0)');
      ctx.fillStyle = grad;
      ctx.fillRect(mine.x * CELL - CELL, mine.y * CELL - CELL, CELL * 3, CELL * 3);

      // Mine body
      ctx.fillStyle = '#ff6600';
      ctx.shadowColor = '#ff6600';
      ctx.shadowBlur = 20;
      ctx.beginPath();
      ctx.arc(mx, my, CELL * 0.35 * pulse, 0, Math.PI * 2);
      ctx.fill();

      // Skull marking
      ctx.shadowBlur = 0;
      ctx.fillStyle = '#1a1a1a';
      ctx.beginPath();
      ctx.arc(mx, my - 2, 4, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillRect(mx - 3, my + 1, 6, 3);
      ctx.fillStyle = '#ff6600';
      ctx.beginPath();
      ctx.arc(mx - 2.5, my - 3, 1.2, 0, Math.PI * 2);
      ctx.arc(mx + 2.5, my - 3, 1.2, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.shadowBlur = 0;

    // Food glow
    const fx = food.x * CELL + CELL/2;
    const fy = food.y * CELL + CELL/2;
    const fgrad = ctx.createRadialGradient(fx, fy, 0, fx, fy, CELL);
    fgrad.addColorStop(0, 'rgba(255, 50, 50, 0.4)');
    fgrad.addColorStop(1, 'rgba(255, 50, 50, 0)');
    ctx.fillStyle = fgrad;
    ctx.fillRect(food.x * CELL - CELL, food.y * CELL - CELL, CELL * 3, CELL * 3);

    // Food
    ctx.fillStyle = '#ff3344';
    ctx.shadowColor = '#ff3344';
    ctx.shadowBlur = 15;
    ctx.beginPath();
    ctx.arc(fx, fy, CELL * 0.35, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;

    // Particles (draw BEFORE snake so they sit on top)
    ctx.save();
    particles = particles.filter(p => {
      p.x += p.vx;
      p.y += p.vy;
      p.vy += 0.05; // gravity
      p.life -= 0.025;
      if (p.life <= 0) return false;
      ctx.globalAlpha = p.life;
      ctx.fillStyle = p.color;
      const sz = p.size || 4;
      ctx.shadowColor = p.color;
      ctx.shadowBlur = 8;
      ctx.fillRect(p.x, p.y, sz, sz);
      return true;
    });
    ctx.restore();
    ctx.shadowBlur = 0;

    // Snake
    const len = snake.length;
    for (let i = len - 1; i >= 0; i--) {
      const s = snake[i];
      const padding = i === 0 ? 2 : 3;
      const size = CELL - padding * 2;

      if (i === 0) {
        const hx = s.x * CELL + CELL/2;
        const hy = s.y * CELL + CELL/2;
        const hg = ctx.createRadialGradient(hx, hy, 0, hx, hy, CELL);
        hg.addColorStop(0, 'rgba(0, 255, 170, 0.15)');
        hg.addColorStop(1, 'rgba(0, 255, 170, 0)');
        ctx.fillStyle = hg;
        ctx.fillRect(s.x * CELL - CELL/2, s.y * CELL - CELL/2, CELL * 2, CELL * 2);
      }

      const color = getColorForSegment(i, len);
      ctx.fillStyle = color;
      ctx.shadowColor = i === 0 ? '#00ffaa' : color;
      ctx.shadowBlur = i === 0 ? 12 : 6;

      const cx = s.x * CELL + padding;
      const cy = s.y * CELL + padding;

      if (i === 0) {
        ctx.beginPath();
        ctx.roundRect(cx, cy, size, size, 5);
        ctx.fill();
      } else {
        ctx.fillRect(cx, cy, size, size);
      }

      // Eyes on head
      if (i === 0) {
        ctx.shadowBlur = 0;
        ctx.fillStyle = '#fff';
        let ex1, ey1, ex2, ey2;
        const eyeSize = Math.max(2, CELL * 0.1);
        if (direction.x === 1) {
          ex1 = s.x * CELL + CELL * 0.65; ey1 = s.y * CELL + CELL * 0.3;
          ex2 = s.x * CELL + CELL * 0.65; ey2 = s.y * CELL + CELL * 0.7;
        } else if (direction.x === -1) {
          ex1 = s.x * CELL + CELL * 0.35; ey1 = s.y * CELL + CELL * 0.3;
          ex2 = s.x * CELL + CELL * 0.35; ey2 = s.y * CELL + CELL * 0.7;
        } else if (direction.y === -1) {
          ex1 = s.x * CELL + CELL * 0.3; ey1 = s.y * CELL + CELL * 0.35;
          ex2 = s.x * CELL + CELL * 0.7; ey2 = s.y * CELL + CELL * 0.35;
        } else {
          ex1 = s.x * CELL + CELL * 0.3; ey1 = s.y * CELL + CELL * 0.65;
          ex2 = s.x * CELL + CELL * 0.7; ey2 = s.y * CELL + CELL * 0.65;
        }
        ctx.beginPath();
        ctx.arc(ex1, ey1, eyeSize, 0, Math.PI * 2);
        ctx.arc(ex2, ey2, eyeSize, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = '#0a0a0f';
        ctx.beginPath();
        ctx.arc(ex1 + direction.x * 1, ey1 + direction.y * 1, Math.max(1, eyeSize * 0.5), 0, Math.PI * 2);
        ctx.arc(ex2 + direction.x * 1, ey2 + direction.y * 1, Math.max(1, eyeSize * 0.5), 0, Math.PI * 2);
        ctx.fill();
      }
    }
    ctx.shadowBlur = 0;
  }

  function spawnParticles(x, y, color, count, big) {
    const sz = big ? 6 : 4;
    for (let i = 0; i < count; i++) {
      const angle = Math.random() * Math.PI * 2;
      const speed = big ? Math.random() * 5 + 2 : Math.random() * 3 + 0.5;
      particles.push({
        x: x * CELL + CELL/2,
        y: y * CELL + CELL/2,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed - (big ? 1 : 0),
        life: 0.8 + Math.random() * 0.4,
        color: color || `hsl(${Math.random() * 60 + 140}, 100%, 70%)`,
        size: sz
      });
    }
  }

  function explodeMine(mine) {
    // Remove mine
    mines = mines.filter(m => m !== mine);

    // Big explosion particles
    spawnParticles(mine.x, mine.y, '#ff6600', 30, true);
    spawnParticles(mine.x, mine.y, '#ffcc00', 20, true);
    spawnParticles(mine.x, mine.y, '#ff3300', 15, true);

    // Damage snake
    const cutLen = Math.max(2, Math.floor(snake.length * 0.4));
    if (snake.length - cutLen < 3) {
      die("💥 Mine killed you!");
      return;
    }
    // Cut tail
    snake.splice(snake.length - cutLen, cutLen);
    score = Math.max(0, score - 2);
    scoreEl.textContent = score;

    // Flash message via overlay temporarily
    const msg = MINE_MSGS[Math.floor(Math.random() * MINE_MSGS.length)];
    // Use a subtle indicator
    const c = document.querySelector('.direction-hint');
    const orig = c.textContent;
    c.textContent = msg;
    c.style.color = '#ff6600';
    setTimeout(() => { c.textContent = orig; c.style.color = '#333'; }, 1200);
  }

  function update() {
    gameTick++;
    direction = {...nextDirection};

    const head = {
      x: snake[0].x + direction.x,
      y: snake[0].y + direction.y
    };

    // Wrap around
    if (head.x < 0) head.x = COLS - 1;
    if (head.x >= COLS) head.x = 0;
    if (head.y < 0) head.y = ROWS - 1;
    if (head.y >= ROWS) head.y = 0;

    // Self collision
    if (snake.some(s => s.x === head.x && s.y === head.y)) {
      die("You collided with yourself");
      return;
    }

    // Mine collision
    const hitMine = mines.find(m => m.x === head.x && m.y === head.y);
    if (hitMine) {
      explodeMine(hitMine);
      if (!running) return;
      // Still grow from food - don't return, continue
    }

    snake.unshift(head);

    // Eat food
    if (head.x === food.x && head.y === food.y) {
      score++;
      scoreEl.textContent = score;
      spawnParticles(food.x, food.y, null, 20, false);
      if (score > highscore) {
        highscore = score;
        localStorage.setItem('slithergrid_high', highscore);
        highEl.textContent = highscore;
      }
      spawnFood();
    } else if (!hitMine) {
      snake.pop();
    }

    // Mine spawning: every 5-8 seconds
    mineTimer++;
    const mineInterval = 50 + Math.floor(Math.random() * 30); // 5-8 seconds at 100ms tick
    if (mineTimer >= mineInterval && mines.length < 3) {
      spawnMine();
      mineTimer = 0;
    }
  }

  function die(msg) {
    running = false;
    clearInterval(gameLoop);
    finalScore.textContent = score;
    finalMsg.textContent = msg || DEATH_MSGS[Math.floor(Math.random() * DEATH_MSGS.length)];
    overlay.classList.add('active');
  }

  function gameTickFn() {
    if (!running) return;
    update();
    draw();
  }

  function resetGame() {
    overlay.classList.remove('active');
    if (gameLoop) clearInterval(gameLoop);
    init();
    running = true;
    gameLoop = setInterval(gameTickFn, 100);
    draw();
    const c = document.querySelector('.direction-hint');
    c.style.color = '#333';
    c.textContent = 'W A S D · Arrows · Swipe';
  }

  // Controls
  document.addEventListener('keydown', e => {
    if (!running && e.key !== 'Enter') return;
    const map = {
      'ArrowUp': {x: 0, y: -1}, 'ArrowDown': {x: 0, y: 1},
      'ArrowLeft': {x: -1, y: 0}, 'ArrowRight': {x: 1, y: 0},
      'w': {x: 0, y: -1}, 's': {x: 0, y: 1},
      'a': {x: -1, y: 0}, 'd': {x: 1, y: 0},
      'W': {x: 0, y: -1}, 'S': {x: 0, y: 1},
      'A': {x: -1, y: 0}, 'D': {x: 1, y: 0}
    };
    const nd = map[e.key];
    if (nd && (nd.x !== -direction.x || nd.y !== -direction.y)) {
      e.preventDefault();
      nextDirection = nd;
    }
    if (e.key === 'Enter' && !running) resetGame();
  });

  // Touch controls
  let touchStart = null;
  canvas.addEventListener('touchstart', e => {
    e.preventDefault();
    const t = e.touches[0];
    touchStart = {x: t.clientX, y: t.clientY};
  }, {passive: false});
  canvas.addEventListener('touchmove', e => e.preventDefault(), {passive: false});
  canvas.addEventListener('touchend', e => {
    if (!touchStart) return;
    const t = e.changedTouches[0];
    const dx = t.clientX - touchStart.x;
    const dy = t.clientY - touchStart.y;
    const adx = Math.abs(dx), ady = Math.abs(dy);
    if (Math.max(adx, ady) < 15) return;
    if (adx > ady) {
      const nd = {x: dx > 0 ? 1 : -1, y: 0};
      if (nd.x !== -direction.x) nextDirection = nd;
    } else {
      const nd = {x: 0, y: dy > 0 ? 1 : -1};
      if (nd.y !== -direction.y) nextDirection = nd;
    }
    touchStart = null;
  });

  // Resize handler
  window.addEventListener('resize', resizeCanvas);

  // Start
  init();
  draw();

  // Pause/Resume with Space
  document.addEventListener('keydown', e => {
    if (e.key === ' ' && running) {
      e.preventDefault();
      if (gameLoop) {
        clearInterval(gameLoop);
        gameLoop = null;
      } else {
        gameLoop = setInterval(gameTickFn, 100);
      }
    }
  });
</script>
</body>
</html>
