<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>SlitherGrid</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0a0a0f;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      min-height: 100dvh;
      font-family: 'Courier New', monospace;
      overflow: hidden;
      touch-action: none;
    }

    .game-wrapper {
      position: relative;
      width: 100vw;
      height: 100vh;
      height: 100dvh;
      background: #0d0d18;
      display: flex;
      flex-direction: column;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 16px;
      background: #111118;
      border-bottom: 1px solid #1a1a2e;
      flex-shrink: 0;
    }

    h1 {
      color: #00ffaa;
      font-size: clamp(12px, 3vw, 22px);
      font-weight: 400;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      text-shadow: 0 0 20px rgba(0, 255, 170, 0.3);
      white-space: nowrap;
    }

    .stats {
      display: flex;
      gap: 12px;
    }

    .stat { text-align: center; min-width: 50px; }

    .stat-label {
      color: #555;
      font-size: clamp(7px, 1.5vw, 10px);
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .stat-value {
      color: #fff;
      font-size: clamp(14px, 3.5vw, 22px);
      font-weight: bold;
    }

    .stat-value.high { color: #ffd700; }
    .stat-value.ai-score { color: #ff6b9d; }

    .canvas-wrap {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      position: relative;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
      touch-action: none;
    }

    .controls {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px 16px;
      background: #111118;
      border-top: 1px solid #1a1a2e;
      flex-shrink: 0;
    }

    button {
      background: transparent;
      border: 1px solid #00ffaa;
      color: #00ffaa;
      padding: 6px 16px;
      font-family: 'Courier New', monospace;
      font-size: clamp(10px, 2.5vw, 13px);
      letter-spacing: 1px;
      text-transform: uppercase;
      cursor: pointer;
      border-radius: 4px;
      transition: all 0.2s;
    }

    button:hover {
      background: rgba(0, 255, 170, 0.1);
      box-shadow: 0 0 20px rgba(0, 255, 170, 0.2);
    }

    .direction-hint {
      color: #444;
      font-size: clamp(8px, 2vw, 11px);
      letter-spacing: 1px;
      transition: color 0.3s;
    }

    .overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: rgba(10, 10, 15, 0.88);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
      z-index: 10;
    }

    .overlay.active {
      opacity: 1;
      pointer-events: all;
    }

    .overlay h2 {
      color: #ff4757;
      font-size: clamp(28px, 10vw, 48px);
      letter-spacing: 4px;
      text-transform: uppercase;
      text-shadow: 0 0 30px rgba(255, 71, 87, 0.3);
      margin-bottom: 4px;
    }

    .overlay .winner {
      color: #00ffaa;
    }

    .overlay .sub {
      color: #888;
      font-size: clamp(12px, 3vw, 16px);
      margin-bottom: 16px;
      text-align: center;
      padding: 0 20px;
    }

    .overlay .final-score {
      color: #fff;
      font-size: clamp(36px, 14vw, 60px);
      font-weight: bold;
      margin-bottom: 2px;
    }

    .overlay .final-label {
      color: #555;
      font-size: clamp(10px, 2.5vw, 12px);
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 16px;
    }

    .overlay button {
      border-color: #ff4757;
      color: #ff4757;
    }

    .overlay button:hover {
      background: rgba(255, 71, 87, 0.1);
    }
  </style>
</head>
<body>

<div class="game-wrapper">
  <div class="header">
    <h1>~ slithergrid ~</h1>
    <div class="stats">
      <div class="stat">
        <div class="stat-label">You</div>
        <div class="stat-value" id="score">0</div>
      </div>
      <div class="stat">
        <div class="stat-label">AI</div>
        <div class="stat-value ai-score" id="aiScore">0</div>
      </div>
      <div class="stat">
        <div class="stat-label">Best</div>
        <div class="stat-value high" id="highscore">0</div>
      </div>
    </div>
  </div>

  <div class="canvas-wrap">
    <canvas id="game"></canvas>
    <div class="overlay" id="overlay">
      <h2 id="overlayTitle">💀 Game Over</h2>
      <div class="final-score" id="finalScore">0</div>
      <div class="final-label" id="finalLabel">points</div>
      <div class="sub" id="finalMsg">You collided with yourself</div>
      <button onclick="resetGame()">↻ Play Again</button>
    </div>
  </div>

  <div class="controls">
    <span class="direction-hint" id="hint">W A S D · Arrows · Swipe</span>
    <button onclick="resetGame()">↻ New Game</button>
  </div>
</div>

<script>
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const scoreEl = document.getElementById('score');
  const aiScoreEl = document.getElementById('aiScore');
  const highEl = document.getElementById('highscore');
  const overlay = document.getElementById('overlay');
  const overlayTitle = document.getElementById('overlayTitle');
  const finalScore = document.getElementById('finalScore');
  const finalLabel = document.getElementById('finalLabel');
  const finalMsg = document.getElementById('finalMsg');
  const hintEl = document.getElementById('hint');

  const GRID = 15;
  let COLS, ROWS, CELL;

  let snake, aiSnake, food, bombs, direction, nextDirection;
  let aiDirection, aiNextDirection;
  let score, aiScore, highscore, gameLoop, running;
  let particles = [];
  let gameTick = 0;

  function calcGrid() {
    const w = canvas.width;
    const h = canvas.height;
    const cellSize = Math.max(8, Math.floor(Math.min(w, h) / Math.floor(Math.min(w, h) / GRID)));
    COLS = Math.floor(w / cellSize);
    ROWS = Math.floor(h / cellSize);
    CELL = Math.min(w / COLS, h / ROWS);
    canvas.width = COLS * CELL;
    canvas.height = ROWS * CELL;
  }

  function init() {
    calcGrid();
    const midX = Math.floor(COLS / 3);
    const midY = Math.floor(ROWS / 2);
    snake = [{x: midX, y: midY}, {x: midX - 1, y: midY}, {x: midX - 2, y: midY}];
    direction = {x: 1, y: 0};
    nextDirection = {x: 1, y: 0};

    const aiX = Math.floor(COLS * 2 / 3);
    aiSnake = [{x: aiX, y: midY}, {x: aiX + 1, y: midY}, {x: aiX + 2, y: midY}];
    aiDirection = {x: -1, y: 0};
    aiNextDirection = {x: -1, y: 0};

    score = 0; aiScore = 0;
    particles = [];
    bombs = [];
    gameTick = 0;
    highscore = parseInt(localStorage.getItem('slithergrid_high') || '0');
    highEl.textContent = highscore;
    spawnFood();
  }

  function spawnFood() {
    let pos;
    let attempts = 0;
    do {
      pos = {x: Math.floor(Math.random() * COLS), y: Math.floor(Math.random() * ROWS)};
      attempts++;
    } while (
      (snake.some(s => s.x === pos.x && s.y === pos.y) ||
       aiSnake.some(s => s.x === pos.x && s.y === pos.y) ||
       (food && food.x === pos.x && food.y === pos.y) ||
       bombs.some(b => b.x === pos.x && b.y === pos.y)) &&
      attempts < 500
    );
    food = pos;
  }

  function spawnBomb() {
    if (bombs.length >= 2) return;
    let pos;
    let attempts = 0;
    do {
      pos = {x: Math.floor(Math.random() * COLS), y: Math.floor(Math.random() * ROWS)};
      attempts++;
    } while (
      (snake.some(s => s.x === pos.x && s.y === pos.y) ||
       aiSnake.some(s => s.x === pos.x && s.y === pos.y) ||
       (food && food.x === pos.x && food.y === pos.y) ||
       bombs.some(b => b.x === pos.x && b.y === pos.y)) &&
      attempts < 200
    );
    if (attempts < 200) {
      bombs.push({x: pos.x, y: pos.y, timer: 0});
    }
  }

  const PLAYER_COLORS = {
    head: '#00ffaa',
    tail: (i, len) => {
      const t = len > 0 ? i / len : 0;
      return `rgb(0,${Math.floor(200 + t * 55)},${Math.floor(100 + t * 155)})`;
    }
  };

  const AI_COLORS = {
    head: '#ff6b9d',
    tail: (i, len) => {
      const t = len > 0 ? i / len : 0;
      return `rgb(${Math.floor(255 - t * 100)},${Math.floor(107 - t * 40)},${Math.floor(157 - t * 50)})`;
    }
  };

  function drawSnake(snakeData, dir, colors, isPlayer) {
    const len = snakeData.length;
    for (let i = len - 1; i >= 0; i--) {
      const s = snakeData[i];
      const isHead = i === 0;
      const pad = isHead ? 1 : 2;
      const size = CELL - pad * 2;

      if (isHead) {
        const hx = s.x * CELL + CELL/2;
        const hy = s.y * CELL + CELL/2;
        const hg = ctx.createRadialGradient(hx, hy, 0, hx, hy, CELL);
        hg.addColorStop(0, isPlayer ? 'rgba(0, 255, 170, 0.1)' : 'rgba(255, 107, 157, 0.1)');
        hg.addColorStop(1, 'rgba(0, 0, 0, 0)');
        ctx.fillStyle = hg;
        ctx.fillRect(s.x * CELL - CELL/2, s.y * CELL - CELL/2, CELL * 2, CELL * 2);
      }

      const color = isHead ? colors.head : colors.tail(i, len);
      ctx.fillStyle = color;
      ctx.shadowColor = isHead ? colors.head : color;
      ctx.shadowBlur = isHead ? 14 : 7;

      const cx = s.x * CELL + pad;
      const cy = s.y * CELL + pad;

      if (isHead) {
        ctx.beginPath();
        ctx.roundRect(cx, cy, size, size, 4);
        ctx.fill();
      } else {
        ctx.fillRect(cx, cy, size, size);
      }

      if (isHead) {
        ctx.shadowBlur = 0;
        ctx.fillStyle = '#fff';
        const es = Math.max(2, CELL * 0.12);
        const d = dir;
        let ex1, ey1, ex2, ey2;
        if (d.x === 1) {
          ex1 = s.x * CELL + CELL * 0.68; ey1 = s.y * CELL + CELL * 0.28;
          ex2 = s.x * CELL + CELL * 0.68; ey2 = s.y * CELL + CELL * 0.72;
        } else if (d.x === -1) {
          ex1 = s.x * CELL + CELL * 0.32; ey1 = s.y * CELL + CELL * 0.28;
          ex2 = s.x * CELL + CELL * 0.32; ey2 = s.y * CELL + CELL * 0.72;
        } else if (d.y === -1) {
          ex1 = s.x * CELL + CELL * 0.28; ey1 = s.y * CELL + CELL * 0.32;
          ex2 = s.x * CELL + CELL * 0.72; ey2 = s.y * CELL + CELL * 0.32;
        } else {
          ex1 = s.x * CELL + CELL * 0.28; ey1 = s.y * CELL + CELL * 0.68;
          ex2 = s.x * CELL + CELL * 0.72; ey2 = s.y * CELL + CELL * 0.68;
        }
        ctx.beginPath();
        ctx.arc(ex1, ey1, es, 0, Math.PI * 2);
        ctx.arc(ex2, ey2, es, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#0a0a0f';
        ctx.beginPath();
        ctx.arc(ex1 + d.x, ey1 + d.y, es * 0.5, 0, Math.PI * 2);
        ctx.arc(ex2 + d.x, ey2 + d.y, es * 0.5, 0, Math.PI * 2);
        ctx.fill();
      }
    }
    ctx.shadowBlur = 0;
  }

  function draw() {
    ctx.fillStyle = '#0d0d18';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Grid
    ctx.strokeStyle = 'rgba(255,255,255,0.02)';
    ctx.lineWidth = 0.5;
    for (let i = 1; i < COLS; i++) {
      ctx.beginPath();
      ctx.moveTo(i * CELL, 0);
      ctx.lineTo(i * CELL, canvas.height);
      ctx.stroke();
    }
    for (let i = 1; i < ROWS; i++) {
      ctx.beginPath();
      ctx.moveTo(0, i * CELL);
      ctx.lineTo(canvas.width, i * CELL);
      ctx.stroke();
    }

    // Bombs (red, look like food used to)
    for (const bomb of bombs) {
      const bx = bomb.x * CELL + CELL/2;
      const by = bomb.y * CELL + CELL/2;
      const pulse = 1 + Math.sin(gameTick * 0.08) * 0.12;

      const grad = ctx.createRadialGradient(bx, by, 0, bx, by, CELL * 1.3);
      grad.addColorStop(0, 'rgba(255, 50, 50, 0.35)');
      grad.addColorStop(1, 'rgba(255, 50, 50, 0)');
      ctx.fillStyle = grad;
      ctx.fillRect(bomb.x * CELL - CELL, bomb.y * CELL - CELL, CELL * 3, CELL * 3);

      ctx.fillStyle = '#ff3344';
      ctx.shadowColor = '#ff3344';
      ctx.shadowBlur = 16;
      ctx.beginPath();
      ctx.arc(bx, by, CELL * 0.38 * pulse, 0, Math.PI * 2);
      ctx.fill();

      // Skull
      ctx.shadowBlur = 0;
      ctx.fillStyle = '#1a0a0a';
      ctx.beginPath();
      ctx.arc(bx, by - 2, CELL * 0.15, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillRect(bx - CELL * 0.1, by + 1, CELL * 0.2, CELL * 0.1);
      ctx.fillStyle = '#ff3344';
      ctx.beginPath();
      ctx.arc(bx - CELL * 0.08, by - 3, CELL * 0.04, 0, Math.PI * 2);
      ctx.arc(bx + CELL * 0.08, by - 3, CELL * 0.04, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.shadowBlur = 0;

    // Food (green, snake-colored)
    if (food) {
      const fx = food.x * CELL + CELL/2;
      const fy = food.y * CELL + CELL/2;
      const pulse = 1 + Math.sin(gameTick * 0.1) * 0.08;

      const fgrad = ctx.createRadialGradient(fx, fy, 0, fx, fy, CELL * 1.3);
      fgrad.addColorStop(0, 'rgba(0, 255, 170, 0.3)');
      fgrad.addColorStop(1, 'rgba(0, 255, 170, 0)');
      ctx.fillStyle = fgrad;
      ctx.fillRect(food.x * CELL - CELL, food.y * CELL - CELL, CELL * 3, CELL * 3);

      ctx.fillStyle = '#00ffaa';
      ctx.shadowColor = '#00ffaa';
      ctx.shadowBlur = 18;
      ctx.beginPath();
      ctx.arc(fx, fy, CELL * 0.35 * pulse, 0, Math.PI * 2);
      ctx.fill();
      ctx.shadowBlur = 0;
    }

    // Particles
    ctx.save();
    particles = particles.filter(p => {
      p.x += p.vx;
      p.y += p.vy;
      p.vy += 0.04;
      p.life -= 0.025;
      if (p.life <= 0) return false;
      ctx.globalAlpha = p.life;
      ctx.fillStyle = p.color;
      ctx.shadowColor = p.color;
      ctx.shadowBlur = 6;
      ctx.fillRect(p.x, p.y, p.size || 4, p.size || 4);
      return true;
    });
    ctx.restore();
    ctx.shadowBlur = 0;

    // AI snake (draw first so player is on top)
    drawSnake(aiSnake, aiDirection, AI_COLORS, false);
    // Player snake
    drawSnake(snake, direction, PLAYER_COLORS, true);
  }

  function spawnParticles(x, y, color, count, big) {
    const sz = big ? 5 : 3;
    for (let i = 0; i < count; i++) {
      const angle = Math.random() * Math.PI * 2;
      const speed = big ? Math.random() * 4 + 1.5 : Math.random() * 2.5 + 0.5;
      particles.push({
        x: x * CELL + CELL/2,
        y: y * CELL + CELL/2,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed - (big ? 0.5 : 0),
        life: 0.7 + Math.random() * 0.4,
        color: color || `hsl(${Math.random() * 40 + 150}, 100%, 70%)`,
        size: sz
      });
    }
  }

  function moveSnake(snakeData, dir, isPlayer) {
    const head = {
      x: snakeData[0].x + dir.x,
      y: snakeData[0].y + dir.y
    };

    if (head.x < 0) head.x = COLS - 1;
    if (head.x >= COLS) head.x = 0;
    if (head.y < 0) head.y = ROWS - 1;
    if (head.y >= ROWS) head.y = 0;

    // Self collision
    if (snakeData.some(s => s.x === head.x && s.y === head.y)) {
      return { dead: true };
    }

    // Collision with other snake
    const other = isPlayer ? aiSnake : snake;
    if (other.some(s => s.x === head.x && s.y === head.y)) {
      return { dead: true };
    }

    // Bomb collision
    const hitBomb = bombs.find(b => b.x === head.x && b.y === head.y);
    if (hitBomb) {
      explodeBomb(hitBomb);
      spawnParticles(hitBomb.x, hitBomb.y, '#ff3344', 25, true);
      spawnParticles(hitBomb.x, hitBomb.y, '#ffcc00', 15, true);
      bombs = bombs.filter(b => b !== hitBomb);
      const cutLen = Math.max(2, Math.floor(snakeData.length * 0.35));
      if (snakeData.length - cutLen < 3) {
        return { dead: true };
      }
      snakeData.splice(snakeData.length - cutLen, cutLen);
    }

    snakeData.unshift(head);

    let ate = false;
    if (head.x === food.x && head.y === food.y) {
      ate = true;
      if (isPlayer) {
        score++;
        scoreEl.textContent = score;
        if (score > highscore) {
          highscore = score;
          localStorage.setItem('slithergrid_high', highscore);
          highEl.textContent = highscore;
        }
      } else {
        aiScore++;
        aiScoreEl.textContent = aiScore;
      }
      spawnParticles(food.x, food.y, '#00ffaa', 20);
      spawnFood();
    }

    if (!ate && !hitBomb) {
      snakeData.pop();
    }

    return { dead: false };
  }

  function explodeBomb(bomb) {
    spawnParticles(bomb.x, bomb.y, '#ff3344', 30, true);
    spawnParticles(bomb.x, bomb.y, '#ffcc00', 20, true);
  }

  function aiThink() {
    const head = aiSnake[0];

    // Simple AI: try to move toward food, avoid self, avoid player
    let targetX = food.x;
    let targetY = food.y;

    // If AI is close to player, try to cut them off
    const distToPlayer = Math.abs(head.x - snake[0].x) + Math.abs(head.y - snake[0].y);
    if (distToPlayer < 5 && aiScore > score) {
      targetX = snake[0].x;
      targetY = snake[0].y;
    }

    const candidates = [];
    const dirs = [
      {x: 1, y: 0, name: 'right'},
      {x: -1, y: 0, name: 'left'},
      {x: 0, y: 1, name: 'down'},
      {x: 0, y: -1, name: 'up'}
    ];

    for (const d of dirs) {
      // Can't reverse
      if (d.x === -aiDirection.x && d.y === -aiDirection.y) continue;

      const nx = (head.x + d.x + COLS) % COLS;
      const ny = (head.y + d.y + ROWS) % ROWS;

      // Check self collision
      if (aiSnake.some(s => s.x === nx && s.y === ny)) continue;
      // Check player collision
      if (snake.some(s => s.x === nx && s.y === ny)) continue;
      // Check bombs
      if (bombs.some(b => b.x === nx && b.y === ny)) continue;

      const dist = Math.abs(nx - targetX) + Math.abs(ny - targetY);
      candidates.push({dir: d, dist});
    }

    if (candidates.length > 0) {
      candidates.sort((a, b) => a.dist - b.dist);
      aiNextDirection = candidates[0].dir;
    }
    // else keep current direction
  }

  function update() {
    gameTick++;

    // Player
    direction = {...nextDirection};
    const playerResult = moveSnake(snake, direction, true);
    if (playerResult.dead) {
      endGame("💀 You Died", score, "The AI got you!");
      return;
    }

    // AI
    aiThink();
    aiDirection = {...aiNextDirection};
    const aiResult = moveSnake(aiSnake, aiDirection, false);
    if (aiResult.dead) {
      endGame("🏆 You Win!", score, "The AI crashed!");
      return;
    }

    // Bomb spawning
    if (gameTick % 60 === 0) {
      spawnBomb();
    }
  }

  function endGame(title, finalScoreVal, msg) {
    running = false;
    clearInterval(gameLoop);
    overlayTitle.textContent = title;
    finalScore.textContent = finalScoreVal;
    finalLabel.textContent = 'points';
    finalMsg.textContent = msg;
    overlay.classList.add('active');
  }

  function gameTickFn() {
    if (!running) return;
    update();
    draw();
  }

  function resetGame() {
    overlay.classList.remove('active');
    if (gameLoop) clearInterval(gameLoop);
    init();
    running = true;
    gameLoop = setInterval(gameTickFn, 100);
    draw();
    hintEl.textContent = 'W A S D · Arrows · Swipe';
    hintEl.style.color = '#444';
  }

  // Controls
  document.addEventListener('keydown', e => {
    if (!running && e.key !== 'Enter') return;
    const map = {
      'ArrowUp': {x: 0, y: -1}, 'ArrowDown': {x: 0, y: 1},
      'ArrowLeft': {x: -1, y: 0}, 'ArrowRight': {x: 1, y: 0},
      'w': {x: 0, y: -1}, 's': {x: 0, y: 1},
      'a': {x: -1, y: 0}, 'd': {x: 1, y: 0},
      'W': {x: 0, y: -1}, 'S': {x: 0, y: 1},
      'A': {x: -1, y: 0}, 'D': {x: 1, y: 0}
    };
    const nd = map[e.key];
    if (nd && (nd.x !== -direction.x || nd.y !== -direction.y)) {
      e.preventDefault();
      nextDirection = nd;
    }
    if (e.key === 'Enter' && !running) resetGame();
    if (e.key === ' ') { e.preventDefault(); }
  });

  // Touch
  let touchStart = null;
  canvas.addEventListener('touchstart', e => {
    e.preventDefault();
    const t = e.touches[0];
    touchStart = {x: t.clientX, y: t.clientY};
  }, {passive: false});
  canvas.addEventListener('touchmove', e => e.preventDefault(), {passive: false});
  canvas.addEventListener('touchend', e => {
    if (!touchStart) return;
    const t = e.changedTouches[0];
    const dx = t.clientX - touchStart.x;
    const dy = t.clientY - touchStart.y;
    const adx = Math.abs(dx), ady = Math.abs(dy);
    if (Math.max(adx, ady) < 15) return;
    if (adx > ady) {
      const nd = {x: dx > 0 ? 1 : -1, y: 0};
      if (nd.x !== -direction.x) nextDirection = nd;
    } else {
      const nd = {x: 0, y: dy > 0 ? 1 : -1};
      if (nd.y !== -direction.y) nextDirection = nd;
    }
    touchStart = null;
  });

  // Resize
  function onResize() {
    if (!running) {
      calcGrid();
      draw();
    }
  }
  window.addEventListener('resize', onResize);

  // Start
  init();
  draw();
</script>
</body>
</html>
